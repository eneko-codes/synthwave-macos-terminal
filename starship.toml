# Synthwave Neon Dark - Starship prompt colors
# Merge these settings into your existing ~/.config/starship.toml
#
# Uses a named palette so all synthwave colors are defined once.
# Requires a Nerd Font for the symbols.

palette = "synthwave"

[palettes.synthwave]
pink = "#ff2d95"
cyan = "#00fff5"
purple = "#c96eff"
yellow = "#fffe6e"
orange = "#ff9e64"
green = "#5cffaa"
blue = "#88aaff"
red = "#ff4055"
fg = "#e2d9f3"
muted = "#6e6890"

[character]
success_symbol = "[❯](bold purple)"
error_symbol = "[❯](bold red)"

[directory]
style = "bold cyan"

[git_branch]
style = "pink"

[git_status]
style = "yellow"

[cmd_duration]
style = "muted"
min_time = 2_000

[nodejs]
style = "green"

[python]
style = "yellow"

[rust]
style = "orange"

[golang]
style = "cyan"

[docker_context]
style = "blue"

[swift]
style = "orange"

[package]
style = "orange"
