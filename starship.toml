# Synthwave Neon Dark ‚ÄĒ Starship Powerline Prompt
# Purple powerline segments with Nerd Font icons.
#
# Copy to ~/.config/starship.toml or merge into your existing config.
# Requires a Nerd Font for symbols and powerline characters.

palette = "synthwave"

format = """
[Óā≤](fg:purple_dark)\
$directory\
[Óāį](bg:purple_mid fg:purple_dark)\
$git_branch\
$git_status\
[Óāį ](fg:purple_mid)\
$fill\
$nodejs$bun$deno$rust$python$golang$java$ruby$kotlin$dart$php$c$lua$elixir$zig$swift$terraform$kubernetes$docker_context$package\
$cmd_duration\
$line_break\
$character"""

[palettes.synthwave]
pink = "#ff2d95"
cyan = "#00fff5"
purple = "#e48fff"
purple_dark = "#382a58"
purple_mid = "#4d3b70"
yellow = "#fffe6e"
orange = "#ff9e64"
green = "#5cffaa"
blue = "#88aaff"
red = "#ff4055"
fg = "#e2d9f3"
bg = "#14101f"
muted = "#5e5575"

[fill]
symbol = " "

[directory]
style = "bg:purple_dark fg:purple bold"
format = "[ ÔĀĽ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[git_branch]
symbol = "Óā†"
style = "bg:purple_dark fg:purple bold"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:purple_mid fg:purple"
format = "[$all_status$ahead_behind]($style)"

[character]
success_symbol = "[‚Äļ](bold purple)"
error_symbol = "[‚Äļ](bold red)"

[cmd_duration]
style = "muted"
min_time = 2_000

[nodejs]
symbol = "Óúė"
style = "green"
format = "[via $symbol $version ]($style)"

[python]
symbol = "Óúľ"
style = "yellow"
format = "[via $symbol $version ]($style)"

[rust]
symbol = "Óě®"
style = "orange"
format = "[via $symbol $version ]($style)"

[golang]
symbol = "Óė¶"
style = "cyan"
format = "[via $symbol $version ]($style)"

[swift]
symbol = "ÓĚē"
style = "orange"
format = "[via $symbol $version ]($style)"


[package]
style = "orange"
format = "[via $symbol$version ]($style)"

[java]
symbol = "ÓČĖ"
style = "red"
format = "[via $symbol $version ]($style)"

[ruby]
symbol = "ÓěĎ"
style = "red"
format = "[via $symbol $version ]($style)"

[php]
symbol = "ÓúĹ"
style = "blue"
format = "[via $symbol $version ]($style)"

[c]
symbol = "Óėě"
style = "blue"
format = "[via $symbol $version ]($style)"

[kotlin]
symbol = "Óėī"
style = "purple"
format = "[via $symbol $version ]($style)"

[dart]
symbol = "Óěė"
style = "cyan"
format = "[via $symbol $version ]($style)"

[lua]
symbol = "Óė†"
style = "blue"
format = "[via $symbol $version ]($style)"

[elixir]
symbol = "Óė≠"
style = "purple"
format = "[via $symbol $version ]($style)"

[zig]
symbol = "Óö©"
style = "orange"
format = "[via $symbol $version ]($style)"

[bun]
style = "fg"
format = "[via $symbol$version ]($style)"

[deno]
style = "green"
format = "[via $symbol$version ]($style)"

[terraform]
style = "blue"
format = "[via $symbol$version ]($style)"

[kubernetes]
style = "cyan"
format = "[on $symbol$context ]($style)"
disabled = false

[docker_context]
style = "blue"
format = "[via $symbol$context ]($style)"
