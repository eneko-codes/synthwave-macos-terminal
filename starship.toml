style = "gray"
format = "[$symbol $version ]($style)"

[dart]
symbol = "оһҳ"
style = "gray"
format = "[$symbol $version ]($style)"

[php]
symbol = "оңҪ"
style = "gray"
format = "[$symbol $version ]($style)"

[c]
symbol = "оҳһ"
style = "gray"
format = "[$symbol $version ]($style)"

[lua]
symbol = "оҳ "
style = "gray"
format = "[$symbol $version ]($style)"

[elixir]
symbol = "оҳӯ"
style = "gray"
format = "[$symbol $version ]($style)"

[zig]
symbol = "оҡ©"
style = "gray"
format = "[$symbol $version ]($style)"

[swift]
symbol = "оқ•"
style = "gray"
format = "[$symbol $version ]($style)"

[haskell]
symbol = "оқ·"
style = "gray"
format = "[$symbol $version ]($style)"

[ocaml]
symbol = "п„Ў"
style = "gray"
format = "[$symbol $version ]($style)"

[perl]
symbol = "оқ©"
style = "gray"
format = "[$symbol $version ]($style)"

[scala]
symbol = "оң·"
style = "gray"
format = "[$symbol $version ]($style)"

[nim]
symbol = "п„Ў"
style = "gray"
format = "[$symbol $version ]($style)"

[julia]
symbol = "п„Ў"
style = "gray"
format = "[$symbol $version ]($style)"

[dotnet]
symbol = "оқҝ"
style = "gray"
format = "[$symbol $version ]($style)"

[crystal]
symbol = "пҲҷ"
style = "gray"
format = "[$symbol $version ]($style)"

[purescript]
symbol = "п„Ў"
style = "gray"
