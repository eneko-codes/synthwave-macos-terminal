# в”Җв”Җв”Җ Build Tools & Packages (gray) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[cmake]
symbol = "пӮ…"
style = "gray"
format = "[$symbol $version ]($style)"

[gradle]
symbol = "пӮ…"
style = "gray"
format = "[$symbol $version ]($style)"

[package]
symbol = "п’Ү"
style = "gray"
format = "[$symbol $version ]($style)"

# в”Җв”Җв”Җ Infrastructure & Cloud (gray) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[docker_context]
symbol = "оһ°"
style = "gray"
format = "[$symbol $context ]($style)"

[kubernetes]
symbol = "пҶі"
style = "gray"
format = "[on $symbol $context ]($style)"
disabled = false

[terraform]
symbol = "пҶІ"
style = "gray"
format = "[$symbol $version ]($style)"

[aws]
symbol = "пү°"
style = "gray"
format = "[$symbol $profile($region) ]($style)"

[gcloud]
symbol = "пҶ "
style = "gray"
format = "[$symbol $project ]($style)"

# в”Җв”Җв”Җ Safety & Environment (red) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[sudo]
disabled = false
symbol = "пҖЈ"
style = "red bold"
format = "[$symbol ]($style)"

[username]
style_user = "red bold"
style_root = "red bold"
format = "[$user]($style_user)[@](gray)"
show_always = false

[hostname]
ssh_only = true
style = "red bold"
format = "[$hostname]($style) "
ssh_symbol = "пҲі "

# в”Җв”Җв”Җ System & Background (gray) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[cmd_duration]
style = "gray"
min_time = 2_000
format = "[$duration ]($style)"

[time]
disabled = false
style = "gray"
format = "[пҖ— $time]($style) "
time_format = "%H:%M"

[jobs]
symbol = "пҖ“"
style = "gray"
threshold = 1
format = "[$symbol$number ]($style)"

[shlvl]
disabled = false
symbol = "п„ "
style = "gray"
threshold = 2
format = "[$symbol$shlvl ]($style)"

[memory_usage]
disabled = true

[battery]
format = "[$percentage ]($style)"

[[battery.display]]
threshold = 30
style = "gray"

[direnv]
disabled = false
symbol = "пғ§"
loaded_msg = " direnv"
unloaded_msg = ""
allowed_msg = ""
denied_msg = " пҒұ"
style = "gray"
format = "[$symbol$loaded$allowed]($style) "

# в”Җв”Җв”Җ Environment Context (gray) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[custom.env]
description = "App environment (prod/local/staging)"
command = 'echo ${APP_ENV:-${NODE_ENV:-${GIN_MODE:-${FLASK_ENV:-${SPRING_PROFILES_ACTIVE:-${ENVIRONMENT:-}}}}}}'
when = 'test -n "${APP_ENV}${NODE_ENV}${GIN_MODE}${FLASK_ENV}${SPRING_PROFILES_ACTIVE}${ENVIRONMENT}"'
symbol = "пӮ¬"
style = "gray"
format = "[$symbol $output ]($style)"
shell = ["sh"]

[custom.db]
command = "echo $DATABASE_URL | sed 's|.*/||;s|?.*||'"
when = 'test -n "$DATABASE_URL"'
symbol = "пҮҖ"
style = "gray"
format = "[$symbol $output ]($style)"
shell = ["sh"]
