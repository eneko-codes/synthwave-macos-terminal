# Synthwave Neon Dark вҖ” Starship Prompt
# Neon-colored text prompt with Nerd Font icons, grouped by category.
#
# Copy to ~/.config/starship.toml or merge into your existing config.
# Requires a Nerd Font (e.g. JetBrains Mono Nerd Font).
#
# Colors by category:
#   purple  вҶ’ navigation       cyan   вҶ’ git
#                              red    вҶ’ danger/attention
#   gray    вҶ’ right-side context (all)
#

palette = "synthwave"

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$fill\
$nodejs$bun$deno$rust$python$golang$java$ruby$kotlin$dart$php$c$lua$elixir$zig$swift\
$haskell$ocaml$perl$scala$nim$julia$dotnet$crystal$purescript\
$cmake$gradle\
$package\
$docker_context$kubernetes$terraform$aws$gcloud\
${custom.env}\
${custom.db}\
$direnv\
$sudo\
$jobs$shlvl\
$memory_usage$battery\
$cmd_duration\
$time\
$line_break\
$status$character"""

[palettes.synthwave]
purple = "#e08fff"
cyan = "#00fff5"
red = "#ff4466"
gray = "#9595a8"
fg = "#eee9f5"

[fill]
symbol = " "

# в”Җв”Җв”Җ Navigation в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[directory]
style = "purple bold"
format = "[$path]($style) "
truncation_length = 3
truncation_symbol = "вҖҰ/"

# в”Җв”Җв”Җ Git в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[git_branch]
symbol = "оӮ "
style = "cyan bold"
format = "[$branch]($style)"

[git_state]
style = "red bold"
format = "[пҒұ $state( $progress_current/$progress_total)]($style) "
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "PICKING"
bisect = "BISECTING"
am = "APPLYING"
am_or_rebase = "AM/REBASE"

[git_status]
style = "cyan"

# в”Җв”Җв”Җ Prompt в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[character]
success_symbol = "[вҖә](bold purple)"
error_symbol = "[вҖә](bold red)"

[status]
disabled = true
style = "red"
symbol = "пҖҚ"
format = "[$symbol $status ]($style)"

# в”Җв”Җв”Җ Languages & Runtimes (gray) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[nodejs]
symbol = "оңҳ"
style = "gray"
format = "[$symbol $version ]($style)"

[bun]
symbol = "п„Ў"
style = "gray"
format = "[$symbol $version ]($style)"

[deno]
symbol = "п„Ў"
style = "gray"
format = "[$symbol $version ]($style)"

[rust]
